name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Vite SPA)
        run: bun run build

      - name: Prepare static output for Pages
        run: |
          set -e
          OUT_DIR="dist"
          test -f "$OUT_DIR/index.html" || (echo "Missing $OUT_DIR/index.html"; exit 1)

          # SPA fallback for deep-link refreshes on GitHub Pages
          cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"

          # Preserve CNAME (public/ auto-copies but be explicit)
          if [ -f "public/CNAME" ]; then
            cp public/CNAME "$OUT_DIR/CNAME"
          fi

          # Disable Jekyll processing on Pages
          touch "$OUT_DIR/.nojekyll"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
