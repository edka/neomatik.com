name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (SPA)
        run: bun run build

      - name: Prepare static output for Pages
        run: |
          set -e
          # TanStack Start SPA build emits static assets to .output/public
          if [ -d ".output/public" ]; then
            OUT_DIR=".output/public"
          elif [ -d "dist" ]; then
            OUT_DIR="dist"
          else
            echo "No build output directory found (.output/public or dist)"; exit 1
          fi
          echo "Using output: $OUT_DIR"

          # SPA fallback for deep-link refreshes on GitHub Pages
          if [ -f "$OUT_DIR/index.html" ]; then
            cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          fi

          # Preserve CNAME (public/ copies over but be explicit)
          if [ -f "public/CNAME" ]; then
            cp public/CNAME "$OUT_DIR/CNAME"
          fi

          # Disable Jekyll processing on Pages
          touch "$OUT_DIR/.nojekyll"

          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
